name: Drift Detection

on:
  schedule:
    # Monthly EUR-Lex check (1st of each month at 03:00 UTC)
    - cron: '0 3 1 * *'
    # Weekly CWE check (Mondays at 04:00 UTC)
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build:db
      - run: npm run build

      - name: Run drift detection
        id: drift
        run: npm run drift:detect || echo "drift_detected=true" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Create drift issue
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream drift detected — ${new Date().toISOString().split('T')[0]}`,
              body: [
                'Scheduled drift detection found hash mismatches between MCP seed data and upstream sources.',
                '',
                'Run `npm run drift:detect` locally to see details.',
                '',
                'See `fixtures/golden-hashes.json` for anchored provisions.',
                '',
                '### Checked sources:',
                '- EUR-Lex: GDPR, NIS2, DORA, SCCs',
                '- NIST SP 800-161r1',
                '- CWE/MITRE trust management family',
              ].join('\n'),
              labels: ['data-drift', 'automated']
            });
